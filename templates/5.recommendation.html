<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>추천 결과</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/globals.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/5.recommendation.css') }}" />
    <style>
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background-color: #f5f7fa;
        position: relative;
      }

      .background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: -1;
      }

      .container {
        max-width: 390px;
        margin: 0 auto;
        padding: 20px;
        position: relative;
        text-align: center;
      }

      .top-right-button {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 30px;
        height: auto;
        cursor: pointer;
      }

      .section-img {
        width: 100%;
        max-width: 310px;
        margin: 15px auto;
        display: block;
        object-fit: contain;
      }

      @media screen and (max-width: 400px) {
        .section-img {
          max-width: 90%;
        }
      }
    </style>
  </head>

  <body>
    <!-- ✅ 배경 이미지 -->
    <img src="{{ url_for('static', filename='images/5.screen_recommendation.jpg') }}" alt="추천 결과 배경" class="background" />

    <div class="container">
      <!-- 내 정보로 이동 버튼 (오른쪽 위) -->
      <img src="{{ url_for('static', filename='images/4.btn_mypage.svg') }}"
           alt="내 정보"
           id="mypage-button"
           class="top-right-button" />

      <!-- 오늘의 일정 텍스트 -->
      <img src="{{ url_for('static', filename='images/5.text_today_schedule.svg') }}"
           alt="오늘 일정"
           class="section-img" />

      <!-- 추천 활동 버튼들 -->
      <img src="{{ url_for('static', filename='images/5.btn_recommendation_act1.svg') }}"
           alt="추천1"
           class="section-img" />

      <img src="{{ url_for('static', filename='images/5.btn_recommendation_act2.svg') }}"
           alt="추천2"
           class="section-img" />

      <!-- 다시 추천 버튼 -->
      <img src="{{ url_for('static', filename='images/5.btn_recommendation_again.svg') }}"
           alt="다시 추천"
           id="again-button"
           class="section-img" />
    </div>

    <script>
      document.getElementById("again-button").addEventListener("click", function () {
        window.location.href = "/recommendation-loading";
      });

      document.getElementById("mypage-button").addEventListener("click", function () {
        window.location.href = "/profile";
      });
    </script>
  </body>
</html>
