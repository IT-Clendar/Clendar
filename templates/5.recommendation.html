<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>추천 결과</title>

    <!-- ✅ CSS 경로 수정 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/globals.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/5.recommendation.css') }}" />
  </head>
  <body>

    <!-- ✅ 추천 결과 배경 이미지 -->
    <img src="{{ url_for('static', filename='images/5.screen_recommendation.jpg') }}" alt="추천 결과 배경" />

    <!-- 추천된 활동 버튼들 -->
    <img src="{{ url_for('static', filename='images/5.btn_recommendation_act1.svg') }}"
         alt="추천1"
         style="position:absolute; top:600px; left:45px; width:310px; height:82px; object-fit:contain;" />

    <img src="{{ url_for('static', filename='images/5.btn_recommendation_act2.svg') }}"
         alt="추천2"
         style="position:absolute; top:700px; left:45px; width:310px; height:82px; object-fit:contain;" />

    <!-- 다시 추천받기 버튼 -->
    <img src="{{ url_for('static', filename='images/5.btn_recommendation_again.svg') }}"
         id="again-button"
         alt="다시 추천"
         style="position:absolute; top:800px; left:45px; width:310px; height:82px; object-fit:contain;" />

    <!-- 추천 날짜 표시 등 텍스트 -->
    <img src="{{ url_for('static', filename='images/5.text_today_schedule.svg') }}"
         alt="오늘 일정 텍스트"
         style="position:absolute; top:530px; left:45px; object-fit:contain;" />

    <!-- 내 정보로 이동 버튼 -->
    <img src="{{ url_for('static', filename='images/4.btn_mypage.svg') }}"
         id="mypage-button"
         alt="내 정보"
         style="position:absolute; top:47px; left:330px; width:29px; height:41px; object-fit:contain;" />

    <script>
      // 다시 추천 → 로딩 화면으로 이동
      document.getElementById("again-button").addEventListener("click", function () {
        window.location.href = "/recommendation-loading";
      });

      // 내 정보 → 프로필로 이동
      document.getElementById("mypage-button").addEventListener("click", function () {
        window.location.href = "/profile";
      });
    </script>

  </body>
</html>
