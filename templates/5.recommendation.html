<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>참여자 체크 - 추천 결과</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/globals.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/5.recommendation.css') }}" />
    <style>
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: url("{{ url_for('static', filename='images/5.screen_recommendation.jpg') }}") no-repeat center top;
        background-size: cover;
        background-attachment: fixed;
      }

      .container {
        max-width: 390px;
        margin: 0 auto;
        padding: 20px;
        text-align: center;
      }

      .title {
        font-size: 24px;
        font-weight: bold;
        color: #333;
        margin-top: 60px;
      }

      .schedule {
        margin: 20px 0;
        font-size: 16px;
        line-height: 1.6;
        color: #111;
      }

      .subtitle {
        margin: 40px 0 15px;
        font-size: 20px;
        font-weight: 500;
      }

      .recommendation-buttons {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .recommendation-buttons button {
        width: 100%;
        height: 50px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        background-color: white;
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        cursor: pointer;
      }

      .retry-button {
        margin-top: 30px;
        background-color: #333;
        color: white;
        font-size: 16px;
        padding: 12px;
        width: 100%;
        border: none;
        border-radius: 25px;
        cursor: pointer;
      }

      .top-icons {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 20px;
      }

      .top-icons img {
        width: 32px;
        height: 32px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top-icons">
        <img src="{{ url_for('static', filename='images/4.btn_mypage.svg') }}" alt="내 정보" id="mypage-button" />
      </div>

      <h2 class="title">🗓️ 오늘의 일정</h2>
      <div class="schedule">
        <p>9:00 러닝</p>
        <p>10:00 학교 수업</p>
        <p>12:00 점심 약속</p>
      </div>

      <h3 class="subtitle">이런 활동은 어떻어요?</h3>
      <div class="recommendation-buttons">
        <button>러닝</button>
        <button>요가</button>
      </div>

      <button class="retry-button" id="again-button">추천 다시 받기</button>
    </div>

    <script>
      document.getElementById("again-button").addEventListener("click", function () {
        window.location.href = "/recommendation-loading";
      });

      document.getElementById("mypage-button").addEventListener("click", function () {
        window.location.href = "/profile";
      });
    </script>
  </body>
</html>
